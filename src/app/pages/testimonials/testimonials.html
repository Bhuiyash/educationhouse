<section class="page-hero">
  <div class="container page-hero__content" appRevealOnScroll>
    <span class="eyebrow">Google Reviews</span>
    <h1>Real Stories From Real Families</h1>
    <p>
      Don't just take our word for it — hear directly from the parents and students who trust Education House
      with their education.
    </p>
  </div>
</section>

<section class="section">
  <div class="container">
    <app-section-title
      eyebrow="Testimonials"
      title="What Parents &amp; Students Say"
      subtitle="We're proud to have earned the trust of students and parents through years of dedicated teaching and personalized guidance."
    />
    <div appRevealOnScroll>
      <app-testimonial-carousel [testimonials]="testimonials()" />
    </div>
  </div>
</section>
