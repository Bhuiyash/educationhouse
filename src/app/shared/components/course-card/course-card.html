<article class="course-card card">
  <div class="course-card__image">
    <img [src]="course().image" [alt]="course().title" loading="lazy" width="640" height="440" />
    <span class="course-card__category">{{ course().category }}</span>
  </div>
  <div class="course-card__body">
    <h3>{{ course().title }}</h3>
    <p>{{ course().description }}</p>
    <dl class="course-card__meta">
      <div>
        <dt>Duration</dt>
        <dd>{{ course().duration }}</dd>
      </div>
      <div>
        <dt>Eligibility</dt>
        <dd>{{ course().eligibility }}</dd>
      </div>
    </dl>
    <app-button routerLink="/contact" variant="outline-primary" size="sm" block>Enroll Now</app-button>
  </div>
</article>
