<ng-template #content><ng-content /></ng-template>

@if (routerLink()) {
  <a [routerLink]="routerLink()" [class]="classes">
    <ng-container [ngTemplateOutlet]="content" />
  </a>
} @else if (href()) {
  <a [href]="href()" [class]="classes">
    <ng-container [ngTemplateOutlet]="content" />
  </a>
} @else {
  <button [type]="type()" [class]="classes" [disabled]="disabled()">
    <ng-container [ngTemplateOutlet]="content" />
  </button>
}
